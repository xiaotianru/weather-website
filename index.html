<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="免费天气查询 - 支持全球主要城市天气预报、空气质量指数、生活指数">
    <title>天气查询 - 实时天气预报</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- AdSense Top Banner -->
    <div class="ad-banner ad-top">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
             data-ad-slot="XXXXXXXXXX"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="container">
        <header>
            <h1>🌤️ 天气查询</h1>
            <p class="subtitle">实时天气预报 | 空气质量 | 生活指数</p>
        </header>

        <!-- Search Box -->
        <div class="search-box">
            <input type="text" id="cityInput" placeholder="输入城市名称（如：北京、上海、广州、深圳）" onkeypress="handleKeyPress(event)">
            <button onclick="searchWeather()">查询</button>
        </div>

        <!-- Weather Result -->
        <div id="weatherResult" class="weather-result"></div>

        <!-- AdSense Bottom Banner -->
        <div class="ad-banner ad-bottom">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
                 data-ad-slot="XXXXXXXXXX"
                 data-ad-format="rectangle"
                 data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <!-- Footer -->
        <footer>
            <p>数据来源：Open-Meteo | <a href="#" onclick="openAbout()">关于我们</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
